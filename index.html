<!DOCTYPE html>
<html> 
    <head>
        <title> Gioithieubanthan </title>
        <meta charset=" utf-8">
        <meta name="viewport" content="width=device-width, inital-scale= 1">
     <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<style>
    body {
        background-color:rgb(255, 255, 255);
        font-family: Arial, sans-serif;
    }

    .jumbotron {
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: whitesmoke;
        padding: 60px 20px;
    }

    h1 {
        font-weight: bold;
    }

    h3 {
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 15px;
    }

    p {
        font-size: 18px;
        color: #555;
    }

    .box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,1);
        transition: 0.3s;
    }

    .box:hover {
        transform: translateY(-5px);
    }
</style>
<!-- Phần code thêm vào để xử lý ẩn hiện nút -->
<script>
    $(document).ready(function(){
        // Giả sử trang này là trang 1
        var currentPage = 1; 
        var totalPages = 3; // Tổng số trang bạn có

        if (currentPage === 1) {
            $(".pager li:first").hide(); // Ẩn nút "Previous" nếu là trang đầu
        }
        
        if (currentPage === totalPages) {
            $(".pager li:last").hide(); // Ẩn nút "Next" nếu là trang cuối
        }
    });
</script>
</head>

<body>

<div class="jumbotron text-center">
  <h1>Giới thiệu bản thân</h1>
</div>
  
<div class="container">
  <div class="row">
    <div class="col-sm-4">
        <div class = "box">
      <h3>Họ tên-Mã lớp </h3>
      <p>Nguyễn Huỳnh Trung Thành</p>
      <p>DA24TTD</p>
    </div>
    </div>
    <div class="col-sm-4">
        <div class = "box">
      <h3>Ngành học</h3>
      <p>Công nghệ thông tin</p>
      <p>Information Technology-IT</p>
    </div>
    </div>
    <div class="col-sm-4">
        <div class = "box">
      <h3> More </h3>        
      <p>Quê: Trà Vinh</p>
      <p>builder and miner in Minecraft</p>
    </div>
  </div>
</div>
</div>
<div class="container">
 
  <ul class="pager">
    <li><a href="#">Previous</a></li>
    <li><a href="#">Next</a></li>
  </ul>
</div>


</body>
</html>
